    stroke-opacity="0.35"
    transform="translate(256 256) rotate(0) scale(0.78) translate(-256 -256)"
  />
  <g filter="url(#meridianGlow)">
    <path
      d="M256 128 L320 384 L288 384 L256 272 L224 384 L192 384 Z"
      fill="none"
      stroke="url(#meridianGrad)"
      stroke-width="22"
      stroke-linejoin="round"
      stroke-linecap="round"
    />
    <line
      x1="256"
      y1="112"
      x2="256"
      y2="400"
      stroke="url(#meridianGrad)"
      stroke-width="4"
      stroke-opacity="0.85"
    />
    <circle cx="256" cy="256" r="10" fill="#22d3ee" />
  </g>
